<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var v=JSON.parse(localStorage.getItem('mf_theme_vars')||'null');if(v){var r=document.documentElement;for(var k in v)r.style.setProperty(k,v[k]);}}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyFirst | Contact</title>
  <link href="https://fonts.googleapis.com/css2?family=Margarine&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="header-title">
        <h1>MoneyFirst</h1>
        <p class="subtitle">Contact Support</p>
      </div>
      <div class="header-tools">
        <a class="btn-secondary" href="dashboard.html">Back to Dashboard</a>
      </div>
    </header>

    <section class="form-section">
      <h2>Submit a Support Ticket</h2>
      <p class="account-section-description">Tell us what went wrong and we will review your request.</p>

      <form id="contact-form">
        <div class="form-row">
          <div class="form-group">
            <label for="contact-name">Name</label>
            <input type="text" id="contact-name" placeholder="Your name" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="contact-email">Return Email</label>
            <input type="email" id="contact-email" placeholder="you@example.com" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="contact-issue">Issue Description</label>
            <textarea id="contact-issue" placeholder="Explain your issue..." minlength="10" required></textarea>
          </div>
        </div>

        <div class="account-form-actions">
          <span class="inline-save-message" id="contact-message" aria-live="polite"></span>
          <button type="submit" class="btn-add" id="contact-submit">Submit Ticket</button>
        </div>
      </form>
    </section>
  </div>

  <script type="module" src="../assets/js/theme.js"></script>
  <script>if (new URLSearchParams(location.search).get('embedded') === '1') document.body.classList.add('embedded');</script>
  <script type="module" src="../assets/js/contact.js"></script>
</body>
</html>
