<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var v=JSON.parse(localStorage.getItem('mf_theme_vars')||'null');if(v){var r=document.documentElement;for(var k in v)r.style.setProperty(k,v[k]);}}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyFirst | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Margarine&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dashboard-page">
  <div class="container">
    <header>
      <div class="header-title">
        <img src="assets/images/logo.png" alt="RookiePay Logo" class="header-logo">
      </div>
      <div class="header-tools">
        <p class="header-greeting" id="header-greeting">Welcome back</p>
        <button class="btn-settings-trigger" id="open-settings" type="button" aria-label="Open settings" aria-haspopup="menu" aria-expanded="false">⚙</button>
        <div class="settings-popover" id="settings-popover" role="menu" aria-labelledby="open-settings" hidden>
          <div class="settings-user-card settings-user-card-link" role="button" tabindex="0" aria-label="Go to account settings" data-subpage="account.html" data-subpage-label="Account">
            <p class="sidebar-user-name" id="sidebar-user-name">User</p>
            <p class="sidebar-user-email" id="sidebar-user-email">Not signed in</p>
          </div>
          <nav class="settings-menu-list">
            <button class="settings-menu-item" type="button" data-subpage="faq.html" data-subpage-label="FAQ">FAQ</button>
            <button class="settings-menu-item" type="button" data-subpage="terms.html" data-subpage-label="Terms &amp; Conditions">Terms and Conditions</button>
            <button class="settings-menu-item settings-menu-item-danger" id="logout-btn" type="button">Logout</button>
          </nav>
        </div>
      </div>
    </header>

    <p class="page-message" id="page-message" aria-live="polite"></p>

    <!-- Tabs + Add Button -->
    <div class="tab-row">
      <nav class="tabs" role="tablist">
        <button class="tab active" data-tab="dashboard" role="tab" aria-selected="true">Dashboard</button>
        <button class="tab" data-tab="history" role="tab" aria-selected="false">History</button>
      </nav>
    </div>

    <!-- Dashboard Tab -->
    <div class="tab-panel" data-panel="dashboard">
      <!-- Summary Cards -->
      <section class="summary">
        <div class="summary-left">
          <div class="card balance">
            <div class="card-header">
              <span class="card-label">Balance</span>
              <button class="btn-add-goal btn-add-transaction" id="open-add-modal" type="button" aria-label="Add transaction">+</button>
            </div>
            <span class="card-amount" id="balance">$0.00</span>
          </div>
          <div class="card breakdown">
            <div class="card-header">
              <span class="card-label">Budget Breakdown</span>
              <div class="breakdown-header-right">
                <button class="btn-breakdown-action" id="open-percentages" type="button">Edit %</button>
              </div>
            </div>
            <ul class="breakdown-list" id="breakdown-list">
              <li class="empty-state">No expenses yet. Add a transaction to see breakdown.</li>
            </ul>
          </div>
        </div>
        <div class="card savings-goals">
          <div class="card-header">
            <span class="card-label">Savings Goals</span>
            <span class="goals-header-message" id="goals-header-message"></span>
            <button class="btn-add-goal" id="open-add-goal-modal">+</button>
          </div>
          <ul class="goals-list" id="goals-list">
            <!-- Goals will be populated by JS -->
          </ul>
        </div>
      </section>
    </div>

    <!-- Add Transaction Modal -->
    <div class="modal" id="add-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
      <div class="modal-backdrop" data-close="true"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="modal-title">Add Transaction</h2>
          <button class="modal-close" type="button" aria-label="Close" data-close="true">✕</button>
        </div>
        <div class="transaction-tabs">
          <button class="transaction-tab active" data-type="income">Income</button>
          <button class="transaction-tab" data-type="expense">Expense</button>
        </div>
        <form id="transaction-form">
          <!-- Income Fields -->
          <div class="form-row income-fields">
            <div class="form-group">
              <label for="amount">Amount</label>
              <div class="amount-input">
                <span class="dollar-sign">$</span>
                <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
              </div>
            </div>
            <div class="form-group">
              <label for="description-select">Description</label>
              <select id="description-select">
                <option value="Salary">Salary</option>
                <option value="External">External</option>
                <option value="Others">Others</option>
              </select>
            </div>
            <div class="form-group" id="custom-description-group" style="display: none;">
              <label for="custom-description">Custom Description (Optional)</label>
              <input type="text" id="custom-description" placeholder="Enter custom description..." />
            </div>
            <div class="form-group">
              <label for="notes">Notes (Optional)</label>
              <textarea id="notes" placeholder="Add any notes..."></textarea>
            </div>
          </div>
          <!-- Expense Fields -->
          <div class="form-row expense-fields" style="display: none;">
            <div class="form-group">
              <label for="expense-title">Title</label>
              <input type="text" id="expense-title" placeholder="e.g., Grocery Shopping"/>
            </div>
            <div class="form-group">
              <label for="expense-amount">Amount</label>
              <div class="amount-input">
                <span class="dollar-sign">$</span>
                <input type="number" id="expense-amount" placeholder="0.00" min="0.01" step="0.01"/>
              </div>
            </div>
            <div class="form-group">
              <label for="expense-category">Category</label>
              <select id="expense-category">
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label for="expense-notes">Notes (Optional)</label>
              <textarea id="expense-notes" placeholder="Add any notes..."></textarea>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" data-close="true">Cancel</button>
            <button type="submit" class="btn-add">+ Add Transaction</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Add Goal Modal -->
    <div class="modal" id="add-goal-modal" role="dialog" aria-modal="true" aria-labelledby="goal-modal-title" hidden>
      <div class="modal-backdrop" data-close="true"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 id="goal-modal-title">Add Savings Goal</h2>
          <button class="modal-close" type="button" aria-label="Close" data-close="true">✕</button>
        </div>
        <form id="goal-form">
          <div class="form-row">
            <div class="form-group">
              <label for="goal-name">Goal Name</label>
              <input type="text" id="goal-name" placeholder="e.g., Emergency Fund" required />
            </div>
            <div class="form-group">
              <label for="goal-amount">Target Amount</label>
              <div class="amount-input">
                <span class="dollar-sign">$</span>
                <input type="number" id="goal-amount" placeholder="0.00" min="0.01" step="0.01" required />
              </div>
            </div>
            <div class="form-group">
              <label for="goal-saved">Current Saved</label>
              <div class="amount-input">
                <span class="dollar-sign">$</span>
                <input type="number" id="goal-saved" placeholder="0.00" min="0" step="0.01" />
              </div>
            </div>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" data-close="true">Cancel</button>
            <button type="submit" class="btn-add">+ Add Goal</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Transaction History -->
    <div class="tab-panel" data-panel="history" hidden>
      <section class="history-section">
        <div class="history-header">
          <h2>Transaction History</h2>
          <button class="btn-clear" id="clear-btn">Clear All</button>
        </div>
        <ul id="transaction-list">
          <li class="empty-state">No transactions yet. Add one above!</li>
        </ul>
      </section>
    </div>

  </div>
  <script src="assets/js/cache-registration.js"></script>
  <script type="module" src="assets/js/theme.js"></script>
  <script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
