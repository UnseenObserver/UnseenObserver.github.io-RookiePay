<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>(function(){try{var v=JSON.parse(localStorage.getItem('mf_theme_vars')||'null');if(v){var r=document.documentElement;for(var k in v)r.style.setProperty(k,v[k]);}}catch(e){}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoneyFirst | Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Margarine&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <main class="auth-shell auth-shell-single">
    <div class="auth-brand">
      <h1>MoneyFirst</h1>
      <p>Your Personal Budget Tracker</p>
    </div>
    <section class="auth-card" aria-label="Authentication forms">
      <div class="auth-tabs" role="tablist" aria-label="Choose login or sign up form">
        <button class="auth-tab active" type="button" role="tab" aria-selected="true" aria-controls="login-panel" id="login-tab">Login</button>
        <button class="auth-tab" type="button" role="tab" aria-selected="false" aria-controls="signup-panel" id="signup-tab">Sign Up</button>
      </div>

      <div class="auth-panel active" id="login-panel" role="tabpanel" aria-labelledby="login-tab">
        <h2>Welcome back</h2>
        <p class="auth-copy">Sign in to continue managing your budget.</p>
        <form class="auth-form" data-mode="login">
          <div class="form-group">
            <label for="login-email">Email address</label>
            <input type="email" id="login-email" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password" required />
          </div>
          <div class="auth-row">
            <label class="checkbox-row">
              <input type="checkbox" />
              <span>Remember me</span>
            </label>
            <a href="#" class="text-link" id="forgot-password-link">Forgot password?</a>
          </div>
          <p class="auth-message" aria-live="polite"></p>
          <button type="submit" class="btn-add auth-submit">Login</button>
        </form>
      </div>

      <div class="auth-panel" id="signup-panel" role="tabpanel" aria-labelledby="signup-tab" hidden>
        <h2>Create account</h2>
        <p class="auth-copy">Set up your profile and start tracking today.</p>
        <form class="auth-form" data-mode="signup">
          <div class="auth-grid">
            <div class="form-group">
              <label for="first-name">First name</label>
              <input type="text" id="first-name" placeholder="Alex" required />
            </div>
            <div class="form-group">
              <label for="last-name">Last name</label>
              <input type="text" id="last-name" placeholder="Taylor" required />
            </div>
          </div>
          <div class="form-group">
            <label for="signup-username">Username</label>
            <input type="text" id="signup-username" placeholder="alex_taylor" minlength="3" maxlength="30" required />
          </div>
          <div class="form-group">
            <label for="signup-email">Email address</label>
            <input type="email" id="signup-email" placeholder="you@example.com" required />
          </div>
          <div class="auth-grid">
            <div class="form-group">
              <label for="signup-password">Password</label>
              <input type="password" id="signup-password" placeholder="Create a password" required />
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm password</label>
              <input type="password" id="confirm-password" placeholder="Repeat password" required />
            </div>
          </div>
          <label class="checkbox-row terms-row">
            <input type="checkbox" required />
            <span>I agree to the terms and privacy policy.</span>
          </label>
          <p class="auth-message" aria-live="polite"></p>
          <button type="submit" class="btn-add auth-submit">Create Account</button>
        </form>
      </div>
    </section>
  </main>

  <script src="assets/js/cache-registration.js"></script>
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
