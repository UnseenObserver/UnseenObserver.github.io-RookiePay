<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Budget Tracker</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <div>
          <h1>Budget Tracker</h1>
          <p class="subtitle">Track your income and expenses</p>
        </div>
        <div class="header-actions">
          <span class="user-email" id="user-email" hidden></span>
          <a class="btn-secondary" id="auth-link" href="login.html">Login / Sign Up</a>
          <button class="btn-secondary" id="logout-btn" type="button" hidden>Logout</button>
        </div>
      </div>
    </header>

    <!-- Summary Cards -->
    <section class="summary">
      <div class="card balance">
        <span class="card-label">Balance</span>
        <span class="card-amount" id="balance">$0.00</span>
      </div>
      <div class="card income">
        <span class="card-label">Total Income</span>
        <span class="card-amount" id="total-income">$0.00</span>
      </div>
      <div class="card expense">
        <span class="card-label">Total Expenses</span>
        <span class="card-amount" id="total-expense">$0.00</span>
      </div>
    </section>

    <!-- Add Transaction Form -->
    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <div class="form-row">
          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="e.g. Rent, Salary..." required />
          </div>
          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category">
              <option value="General">General</option>
              <option value="Food">Food</option>
              <option value="Housing">Housing</option>
              <option value="Transport">Transport</option>
              <option value="Entertainment">Entertainment</option>
              <option value="Healthcare">Healthcare</option>
              <option value="Salary">Salary</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="type">Type</label>
            <select id="type">
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-add">+ Add Transaction</button>
      </form>
    </section>

    <!-- Transaction History -->
    <section class="history-section">
      <div class="history-header">
        <h2>Transaction History</h2>
        <button class="btn-clear" id="clear-btn">Clear All</button>
      </div>
      <ul id="transaction-list">
        <li class="empty-state">No transactions yet. Add one above!</li>
      </ul>
    </section>
  </div>

  <script src="cache-registration.js"></script>

  <script type="module">
    import { auth, db } from './firebase-config.js';
    import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js';
    import {
      addDoc,
      collection,
      deleteDoc,
      doc,
      onSnapshot,
      orderBy,
      query,
      serverTimestamp,
      writeBatch
    } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

    const form = document.getElementById('transaction-form');
    const list = document.getElementById('transaction-list');
    const clearBtn = document.getElementById('clear-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const authLink = document.getElementById('auth-link');
    const userEmail = document.getElementById('user-email');

    let transactions = [];
    let currentUser = null;
    let unsubscribeTransactions = null;

    function formatCurrency(amount) {
      return '$' + amount.toFixed(2);
    }

    function updateSummary() {
      const income = transactions
        .filter((transaction) => transaction.type === 'income')
        .reduce((sum, transaction) => sum + transaction.amount, 0);
      const expense = transactions
        .filter((transaction) => transaction.type === 'expense')
        .reduce((sum, transaction) => sum + transaction.amount, 0);
      const balance = income - expense;

      const balanceEl = document.getElementById('balance');
      balanceEl.textContent = formatCurrency(balance);
      balanceEl.className = `card-amount ${balance >= 0 ? 'positive' : 'negative'}`;

      document.getElementById('total-income').textContent = formatCurrency(income);
      document.getElementById('total-expense').textContent = formatCurrency(expense);
    }

    function renderList() {
      if (transactions.length === 0) {
        list.innerHTML = '<li class="empty-state">No transactions yet. Add one above!</li>';
        return;
      }

      list.innerHTML = transactions.map((transaction) => `
        <li class="transaction-item ${transaction.type}">
          <div class="transaction-info">
            <span class="transaction-desc">${transaction.description}</span>
            <span class="transaction-category">${transaction.category}</span>
          </div>
          <div class="transaction-right">
            <span class="transaction-amount">${transaction.type === 'income' ? '+' : '-'}${formatCurrency(transaction.amount)}</span>
            <button class="btn-delete" type="button" data-id="${transaction.id}">✕</button>
          </div>
        </li>
      `).join('');
    }

    async function deleteTransaction(transactionId) {
      if (!currentUser || !transactionId) {
        return;
      }

      await deleteDoc(doc(db, 'users', currentUser.uid, 'transactions', transactionId));
    }

    function subscribeToTransactions(uid) {
      if (unsubscribeTransactions) {
        unsubscribeTransactions();
      }

      const transactionsRef = collection(db, 'users', uid, 'transactions');
      const transactionsQuery = query(transactionsRef, orderBy('createdAt', 'desc'));

      unsubscribeTransactions = onSnapshot(transactionsQuery, (snapshot) => {
        transactions = snapshot.docs.map((entry) => {
          const data = entry.data();
          return {
            id: entry.id,
            description: data.description || 'Untitled',
            category: data.category || 'General',
            type: data.type === 'income' ? 'income' : 'expense',
            amount: Number(data.amount) || 0
          };
        });

        renderList();
        updateSummary();
      });
    }

    list.addEventListener('click', async (event) => {
      const button = event.target.closest('.btn-delete');
      if (!button) {
        return;
      }

      await deleteTransaction(button.dataset.id);
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      if (!currentUser) {
        return;
      }

      const description = document.getElementById('description').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);
      const category = document.getElementById('category').value;
      const type = document.getElementById('type').value;

      if (!description || Number.isNaN(amount) || amount <= 0) {
        return;
      }

      await addDoc(collection(db, 'users', currentUser.uid, 'transactions'), {
        description,
        amount,
        category,
        type,
        createdAt: serverTimestamp()
      });

      form.reset();
    });

    clearBtn.addEventListener('click', async () => {
      if (!currentUser || transactions.length === 0) {
        return;
      }

      if (!confirm('Clear all transactions?')) {
        return;
      }

      const batch = writeBatch(db);

      transactions.forEach((transaction) => {
        const ref = doc(db, 'users', currentUser.uid, 'transactions', transaction.id);
        batch.delete(ref);
      });

      await batch.commit();
    });

    logoutBtn.addEventListener('click', async () => {
      await signOut(auth);
      window.location.href = 'login.html';
    });

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        if (unsubscribeTransactions) {
          unsubscribeTransactions();
          unsubscribeTransactions = null;
        }
        window.location.replace('login.html');
        return;
      }

      currentUser = user;
      userEmail.textContent = user.email || user.displayName || 'Signed in';
      userEmail.hidden = false;
      authLink.hidden = true;
      logoutBtn.hidden = false;

      subscribeToTransactions(user.uid);
    });
  </script>
</body>
</html>
